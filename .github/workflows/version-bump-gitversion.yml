name: Version Bump (GitVersion)

on:
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "5.x"

      - name: Compute version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Detect no-op bump
        id: noop
        run: |
          CURRENT_VERSION="$(jq -r '.version' .plugin/plugin.json)"
          NEXT_VERSION="${{ steps.gitversion.outputs.MajorMinorPatch }}"

          echo "Current version: $CURRENT_VERSION"
          echo "Computed version: $NEXT_VERSION"

          if [[ "$CURRENT_VERSION" == "$NEXT_VERSION" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No-op detected: skipping version update PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply computed version
        if: steps.noop.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.gitversion.outputs.MajorMinorPatch }}"
          bash scripts/set-plugin-version.sh "$VERSION"

      - name: Sync mirrors
        if: steps.noop.outputs.changed == 'true'
        run: bash scripts/sync-plugin-mirrors.sh

      - name: Create Pull Request
        if: steps.noop.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.FINE_GRAINED_PAT }}
          branch: chore/version-bump-${{ steps.gitversion.outputs.MajorMinorPatch }}
          commit-message: "chore: bump plugin version to ${{ steps.gitversion.outputs.MajorMinorPatch }}"
          title: "chore: bump plugin version to ${{ steps.gitversion.outputs.MajorMinorPatch }}"
          body: |
            Automated version bump generated with GitVersion.

            - Version: `${{ steps.gitversion.outputs.MajorMinorPatch }}`
            - Updated: `.plugin/plugin.json`, `.plugin/marketplace.json`
            - Synced mirrors: `.github/agents`, `.github/skills`
          labels: |
            chore
            release

      - name: No-op summary
        if: steps.noop.outputs.changed != 'true'
        run: echo "Computed version matches current manifest version. No PR created."
